# WowBlog Nginx 反向代理配置
# 默认：监听 80，反代到 backend:8000
# 生产 HTTPS：在 docker/nginx/ssl/ 放入 fullchain.pem 与 privkey.pem 后，
#             取消文件末尾 443 server 段的注释，并设置正确的 server_name。

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    sendfile             on;
    keepalive_timeout    65;
    client_max_body_size 25m;   # 与上传限制匹配（默认 1m 太小）

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # 基础安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API 与根路径反代到 FastAPI
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # 上传文件 / 静态资源
        location /static/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # nginx 自身探活（与后端 /health 解耦）
        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }
    }

    # ============ 生产 HTTPS 示例（默认注释；放好证书后启用）============
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_session_cache shared:SSL:5m;
    #     ssl_session_timeout 1d;
    #     # 其余 location 配置与上方 80 段一致
    # }
}
