name: Bug 报告
description: 报告一个问题,帮助我们改进
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你抽时间反馈问题!请尽量填写完整,便于我们定位。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么?期望的行为是什么?
      placeholder: 清晰描述问题与期望...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 出现 '...'
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境
      description: 操作系统、浏览器、Node/Python 版本、是否使用 Docker 等
      placeholder: "OS: macOS 14 / 浏览器: Chrome 120 / Node: 20.x / Python: 3.13 / Docker: 是"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 报错信息 / 日志
      render: shell
    validations:
      required: false
