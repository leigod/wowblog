name: 功能建议
description: 提出一个新功能或改进想法
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个功能是为了解决什么痛点?
      placeholder: "我在使用时发现..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望它怎么工作?
      placeholder: 描述你想要的功能...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      placeholder: 你考虑过的其他做法...
    validations:
      required: false
